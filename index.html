<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOSE MOORI | SYSTEM OPERATOR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="void-background"></div>
    <div class="void-energy"></div>

    <div id="auth-section" class="auth-overlay">
        <div class="gate-card" data-aos="zoom-in" data-aos-duration="1500">
            <div class="gate-header text-center">
                <div class="gate-vortex"></div>
                <h1 class="system-title" id="auth-title">SYSTEM_INIT</h1>
                <p class="small opacity-50">OPERATOR: JOSE MOORI | UPLA-PERÚ</p>
            </div>
            <div class="p-4 pt-5">
                <div class="cyber-input mb-3">
                    <label>OPERATOR_ID</label>
                    <input type="text" id="user" placeholder="INPUT OPERATOR KEY">
                    <i class="fa fa-id-badge"></i>
                </div>
                <div class="cyber-input mb-3">
                    <label>ENCRYPTION_PASS</label>
                    <input type="password" id="pass" placeholder="••••••••">
                    <i class="fa fa-user-secret"></i>
                </div>

                <div id="reg-fields" class="d-none animate-fade">
                    <div class="cyber-input mb-3">
                        <label>FULL_IDENTITY</label>
                        <input type="text" id="full-name" placeholder="JOSE MOORI">
                        <i class="fa fa-id-card"></i>
                    </div>
                    <div class="mb-3">
                        <select id="reg-role" class="cyber-select">
                            <option value="VISUALIZADOR">VISUALIZER (Guest)</option>
                            <option value="ADMIN">ADMINISTRATOR (Kevin)</option>
                        </select>
                    </div>
                </div>
                
                <button onclick="ejecutarAccion()" id="main-btn" class="btn-void-pulse w-100 py-3 mb-3">
                    INITIATE GATE SEQUENCE
                </button>
                <div class="text-center">
                    <button type="button" onclick="toggleAuth()" id="btn-toggle" class="btn-link-purpura small text-decoration-none">
                        ¿No tienes cuenta? Registra tu operador aquí
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="portfolio-section" class="d-none">
        <nav class="navbar navbar-dark void-nav sticky-top px-4 shadow-lg">
            <span class="navbar-brand fw-bold system-tag">
                [<span class="text-purpura">MOORI_OS</span>] OPERATOR ARCHIVE
            </span>
            <div class="d-flex align-items-center">
                <span id="nav-username" class="me-3 operator-id fw-bold"></span>
                <button onclick="logout()" class="btn-exit"><i class="fa fa-power-off"></i></button>
            </div>
        </nav>

        <div class="container-fluid py-5 px-5">
            <div class="row gx-4 justify-content-center">
                <div class="col-lg-3 col-md-6 mb-4" data-aos="fade-up" data-aos-delay="100">
                    <div class="unit-status-card" onclick="abrirUnidad(1)">
                        <div class="card-bg-gif"><img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKSjPQC1Q7UsC88/giphy.gif"></div>
                        <div class="status-indicator"></div>
                        <div class="card-content">
                            <span class="unit-label">U_01</span>
                            <h3>DATA<br>ANALYSIS</h3>
                            <div class="stats-counter" id="cnt-1">STATUS: 0 RECORDS</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-4" data-aos="fade-up" data-aos-delay="200">
                    <div class="unit-status-card" onclick="abrirUnidad(2)">
                        <div class="card-bg-gif"><img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/qgQUggAC3Pfv687qPC/giphy.gif"></div>
                        <div class="status-indicator purple"></div>
                        <div class="card-content">
                            <span class="unit-label">U_02</span>
                            <h3>RELATIONAL<br>DESIGN</h3>
                            <div class="stats-counter" id="cnt-2">STATUS: 0 RECORDS</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-4" data-aos="fade-up" data-aos-delay="300">
                    <div class="unit-status-card" onclick="abrirUnidad(3)">
                        <div class="card-bg-gif"><img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/Lndtxw3ztLhNC/giphy.gif"></div>
                        <div class="status-indicator cyan"></div>
                        <div class="card-content">
                            <span class="unit-label">U_03</span>
                            <h3>SENTENCIAS<br>SQL</h3>
                            <div class="stats-counter" id="cnt-3">STATUS: 0 RECORDS</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-4" data-aos="fade-up" data-aos-delay="400">
                    <div class="unit-status-card" onclick="abrirUnidad(4)">
                        <div class="card-bg-gif"><img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/26n6WywJyh39n1pBu/giphy.gif"></div>
                        <div class="status-indicator magenta"></div>
                        <div class="card-content">
                            <span class="unit-label">U_04</span>
                            <h3>SECURITY<br>PROTOCOL</h3>
                            <div class="stats-counter" id="cnt-4">STATUS: 0 RECORDS</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="unit-modal" class="modal-overlay d-none">
        <div class="void-manager-card">
            <div class="modal-head-void d-flex justify-content-between align-items-center mb-4">
                <h3 class="text-purpura fw-bold m-0" id="modal-unit-title">DATA UNIT</h3>
                <button class="btn-close btn-close-white" onclick="cerrarUnidad()"></button>
            </div>

            <div class="week-selector mb-4">
                <button class="btn-week" onclick="seleccionarSemana(1)">WEEK 1</button>
                <button class="btn-week" onclick="seleccionarSemana(2)">WEEK 2</button>
                <button class="btn-week" onclick="seleccionarSemana(3)">WEEK 3</button>
                <button class="btn-week" onclick="seleccionarSemana(4)">WEEK 4</button>
            </div>

            <div id="week-content" class="d-none">
                <div id="admin-zone" class="mb-4 d-none">
                    <div class="p-3 rounded border border-secondary bg-dark shadow">
                        <input type="text" id="file-title" class="form-control cyber-input-style mb-2" placeholder="Título del Trabajo Académico">
                        <div class="input-group">
                            <input type="file" id="file-input" class="form-control cyber-input-style">
                            <button onclick="guardarArchivo()" class="btn btn-purpura-glow fw-bold">DEPOSIT DATA</button>
                        </div>
                    </div>
                </div>

                <div class="scroll-area">
                    <table class="table-void m-0 align-middle">
                        <tbody id="unit-files-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="select-prompt" class="text-center py-5">
                <div class="loading-portal"></div>
                <p class="text-purpura mt-3 opacity-75">WAITING FOR SELECTION... CHOOSE A WEEK</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.css.js"; 
        // Nota: Si el link de arriba falla por .css.js usa este: https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js

        const firebaseConfig = {
            apiKey: "AIzaSyBcyRW01nCKJ4-6VtqLh52bJw3m7NN5BCg",
            authDomain: "jose-portafolio-76997.firebaseapp.com",
            projectId: "jose-portafolio-76997",
            storageBucket: "jose-portafolio-76997.firebasestorage.app",
            messagingSenderId: "25029747925",
            appId: "1:25029747925:web:3a4942aeb7a8eba038ae5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.db = db;
        window.storage = storage;
        window.fStore = { doc, setDoc, getDoc, collection, query, where, getDocs, addDoc, deleteDoc, ref, uploadBytes, getDownloadURL, deleteObject };
    </script>
    
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
    <script>AOS.init();</script>
</body>
</html>
