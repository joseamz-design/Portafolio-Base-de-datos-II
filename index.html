<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | José Moori Zegarra</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="nav-container">
            <div class="logo">
                <span class="upla-text">UPLA</span>
                <span class="course-text">BD II</span>
            </div>
            <nav class="nav-menu">
                <ul class="nav-links">
                    <li><a href="#inicio" class="nav-item">Inicio</a></li>
                    <li><a href="#unidades-section" class="nav-item">Unidades</a></li>
                </ul>
            </nav>
            <div class="nav-auth">
                <button class="btn-login" onclick="openLoginModal()">👤 Login</button>
            </div>
        </div>
    </header>

    <section id="inicio" class="section dark-bg">
        <div class="hero-content">
            <div class="profile-circle"></div>
            <h2>Jose Andres Moori Zegarra</h2>
            <p>Ingeniería | <span class="coral">Base de Datos II</span></p>
        </div>
    </section>

    <section id="unidades-section" class="section dark-bg">
        <h2 class="section-title">Unidades de Aprendizaje</h2>
        <div class="unidades-grid">
            <div class="unidad-card" onclick="openUnitModal(1)">
                <div class="unidad-icon">📘</div>
                <h3>Unidad I</h3>
            </div>
            <div class="unidad-card" onclick="openUnitModal(2)">
                <div class="unidad-icon">📗</div>
                <h3>Unidad II</h3>
            </div>
            <div class="unidad-card" onclick="openUnitModal(3)">
                <div class="unidad-icon">📙</div>
                <h3>Unidad III</h3>
            </div>
            <div class="unidad-card" onclick="openUnitModal(4)">
                <div class="unidad-icon">📕</div>
                <h3>Unidad IV</h3>
            </div>
        </div>
    </section>

    <div id="unitModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('unitModal')">&times;</span>
            <h2 id="unitTitle">Unidad I</h2>
            <div class="modulos-container">
                <button class="btn-modulo" onclick="openTaskZone(1)">Semana 1</button>
                <button class="btn-modulo" onclick="openTaskZone(2)">Semana 2</button>
                <button class="btn-modulo" onclick="openTaskZone(3)">Semana 3</button>
                <button class="btn-modulo" onclick="openTaskZone(4)">Semana 4</button>
            </div>
        </div>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('taskModal')">&times;</span>
            <h3 id="taskTitle">Semana 1</h3>
            <div class="upload-area">
                <button class="btn-coral" onclick="document.getElementById('fileIn').click()">+ Seleccionar de PC</button>
                <input type="file" id="fileIn" style="display:none" onchange="uploadFile(event)">
            </div>
            <div id="fileList" class="storage-list"></div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content auth-card">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2>Login</h2>
            <input type="email" placeholder="Correo" class="modern-input">
            <input type="password" placeholder="Contraseña" class="modern-input">
            <button class="btn-coral" onclick="closeModal('loginModal')">Entrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
