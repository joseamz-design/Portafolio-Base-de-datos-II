<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | José Moori Zegarra</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="nav-container">
            <h1 class="logo">UPLA <span>BD II</span></h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="#inicio">Inicio</a></li>
                    <li><a href="#unidades-section">Unidades</a></li>
                    <li><a href="#proyectos">Proyectos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="unidades-section" class="section dark-bg">
        <h2 class="section-title">Unidades de Aprendizaje</h2>
        <div class="unidades-grid">
            <div class="unidad-card" onclick="openUnitModal(1)">
                <div class="unidad-icon">📘</div>
                <h3>Unidad I</h3>
                <p>Fundamentos y Diseño</p>
            </div>
            <div class="unidad-card" onclick="openUnitModal(2)">
                <div class="unidad-icon">📗</div>
                <h3>Unidad II</h3>
                <p>Implementación SQL</p>
            </div>
            <div class="unidad-card" onclick="openUnitModal(3)">
                <div class="unidad-icon">📙</div>
                <h3>Unidad III</h3>
                <p>Optimización</p>
            </div>
            <div class="unidad-card" onclick="openUnitModal(4)">
                <div class="unidad-icon">📕</div>
                <h3>Unidad IV</h3>
                <p>Seguridad y Backup</p>
            </div>
        </div>
    </section>

    <div id="unitModal" class="modal">
        <div class="modal-content medium">
            <span class="close" onclick="closeModal('unitModal')">&times;</span>
            <h2 id="unitTitle">Unidad I</h2>
            <div class="modulos-container">
                <button class="btn-modulo" onclick="openTaskZone(1)">Semana 1</button>
                <button class="btn-modulo" onclick="openTaskZone(2)">Semana 2</button>
                <button class="btn-modulo" onclick="openTaskZone(3)">Semana 3</button>
                <button class="btn-modulo" onclick="openTaskZone(4)">Semana 4</button>
            </div>
        </div>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('taskModal')">&times;</span>
            <h3 id="taskTitle">Semana 1</h3>
            <div class="upload-area">
                <button class="btn-coral" onclick="document.getElementById('fileIn').click()">+ Seleccionar Archivo</button>
                <input type="file" id="fileIn" style="display:none" onchange="uploadFile(event)">
            </div>
            <div class="storage-list">
                <h4>Archivos en esta semana:</h4>
                <div id="fileList"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
