<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Pro | José Moori</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="nav-container">
            <h1 class="logo">UPLA <span>BD II</span></h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="#inicio">Inicio</a></li>
                    <li><a href="#semanas-section">Semanas</a></li>
                    <li><a href="#proyectos">Proyectos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="semanas-section" class="section dark-bg">
        <h2 class="section-title">Gestión Académica (Semanas 1-4)</h2>
        <p style="margin-bottom: 40px; color: #94a3b8;">Haz clic en el nombre para descargar, usa los iconos para editar o borrar.</p>
        
        <div class="semanas-grid">
            <div class="semana-card">
                <h3>Semana 1</h3>
                <div class="task-list" id="list-1"></div>
                <button class="btn-add" onclick="triggerInput(1)">+ Subir Tarea</button>
            </div>
            <div class="semana-card">
                <h3>Semana 2</h3>
                <div class="task-list" id="list-2"></div>
                <button class="btn-add" onclick="triggerInput(2)">+ Subir Tarea</button>
            </div>
            <div class="semana-card">
                <h3>Semana 3</h3>
                <div class="task-list" id="list-3"></div>
                <button class="btn-add" onclick="triggerInput(3)">+ Subir Tarea</button>
            </div>
            <div class="semana-card">
                <h3>Semana 4</h3>
                <div class="task-list" id="list-4"></div>
                <button class="btn-add" onclick="triggerInput(4)">+ Subir Tarea</button>
            </div>
        </div>
        <input type="file" id="globalInput" style="display:none" onchange="uploadTask(event)">
    </section>

    <div id="editModal" class="modal">
        <div class="modal-content small">
            <h3>Editar nombre del archivo</h3>
            <input type="text" id="editNameInput" class="modern-input">
            <div style="margin-top:20px">
                <button class="btn-coral" onclick="saveEdit()">Guardar</button>
                <button class="btn-outline" onclick="closeEditModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
